pre-push:
  parallel: true
  commands:
    ruff-check:
      run: uv run ruff check
    ruff-format:
      run: uv run ruff format --check
    changelog:
      glob: "changelog/**"
      run: uvx tenzir-ship --root changelog validate --lenient

fix:
  parallel: false
  commands:
    ruff-check:
      run: uv run ruff check --fix
    ruff-format:
      run: uv run ruff format
