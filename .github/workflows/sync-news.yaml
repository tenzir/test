name: Sync to News

on:
  push:
    branches: [main]
    paths:
      - "changelog/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Trigger news sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Generate app token
        id: app-token
        env:
          APP_ID: ${{ vars.TENZIR_GITHUB_APP_ID }}
          PRIVATE_KEY: ${{ secrets.TENZIR_GITHUB_APP_PRIVATE_KEY }}
          TARGET_REPOSITORY: tenzir/news
        run: |
          ./.github/scripts/create-app-token.sh \
            --app-id "$APP_ID" \
            --repository "$TARGET_REPOSITORY"

      - name: Trigger sync workflow
        uses: tenzir/news/.github/actions/sync@main
        with:
          token: ${{ steps.app-token.outputs.token }}
