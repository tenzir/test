created: 2026-05-13
title: Project fixture inline dependencies
intro: >-
  Project fixtures can now declare their Python package dependencies inline with PEP
  723 metadata. tenzir-test installs those dependencies before loading fixtures, so
  regular test runs and fixture mode work for projects with self-contained fixture
  modules.
